# =============================================================================
# MONITOR B3 — GitHub Actions Workflow
# =============================================================================
# Executa às 09h00 e 16h00 (horário de Brasília = 12h00 e 19h00 UTC)
# Persiste o banco de deduplicação via commit automático no repositório
# =============================================================================

name: Monitor B3 — Notícias

on:
  schedule:
    - cron: '0 13 * * *'   # 10:00 BRT — disparo manhã
    - cron: '30 13 * * *'  # 10:30 BRT — retry manhã
    - cron: '0 17 * * *'   # 14:00 BRT — disparo tarde
    - cron: '30 17 * * *'  # 14:30 BRT — retry tarde
    - cron: '0 21 * * *'   # 18:00 BRT — disparo fim de tarde
    - cron: '30 21 * * *'  # 18:30 BRT — retry fim de tarde
  workflow_dispatch:

jobs:
  monitorar:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    permissions:
      contents: write

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependências
        run: pip install -r requirements.txt

      - name: Registrar horário de execução
        run: |
          echo "UTC: $(date -u '+%H:%M')"
          echo "BRT: $(TZ='America/Sao_Paulo' date '+%H:%M')"

      - name: Executar Monitor B3
        env:
          EMAIL_REMETENTE:    ${{ secrets.EMAIL_REMETENTE }}
          SENHA_APP:          ${{ secrets.SENHA_APP }}
          EMAIL_DESTINATARIO: ${{ secrets.EMAIL_DESTINATARIO }}
        run: python main.py

      - name: Salvar banco de deduplicação
        if: always()
        run: |
          git config user.name  "Monitor B3 Bot"
          git config user.email "monitor-b3@github-actions"
          git add noticias_enviadas.db || true
          git diff --staged --quiet || git commit -m "chore: atualiza banco de deduplicação [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          git push || true
