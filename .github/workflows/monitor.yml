name: Monitor B3 — Notícias

on:
  schedule:
    - cron: '0 9 * * *'    # 09:00 BRT
    - cron: '30 9 * * *'   # 09:30 BRT — retry manhã
    - cron: '0 16 * * *'   # 16:00 BRT
    - cron: '30 16 * * *'  # 16:30 BRT — retry tarde
  workflow_dispatch:

jobs:
  monitorar:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    permissions:
      contents: write

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependências
        run: pip install -r requirements.txt

      - name: Registrar horário de execução
        run: |
          echo "UTC: $(date -u '+%H:%M')"
          echo "BRT estimado: $(TZ='America/Sao_Paulo' date '+%H:%M')"

      - name: Executar Monitor B3
        env:
          EMAIL_REMETENTE:    ${{ secrets.EMAIL_REMETENTE }}
          SENHA_APP:          ${{ secrets.SENHA_APP }}
          EMAIL_DESTINATARIO: ${{ secrets.EMAIL_DESTINATARIO }}
        run: python main.py

      - name: Salvar banco de deduplicação
        if: always()
        run: |
          git config user.name  "Monitor B3 Bot"
          git config user.email "monitor-b3@github-actions"
          git add noticias_enviadas.db || true
          git diff --staged --quiet || git commit -m "chore: atualiza banco de deduplicação [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          git push || true
