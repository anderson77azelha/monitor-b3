name: Keep Alive

on:
  schedule:
    - cron: '0 10 * * 1'  # Toda segunda-feira às 10h UTC
  workflow_dispatch:

jobs:
  keepalive:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Manter repositório ativo
        run: |
          git config user.name  "Monitor B3 Bot"
          git config user.email "monitor-b3@github-actions"
          echo "Última verificação: $(date -u '+%Y-%m-%d %H:%M UTC')" > .keepalive
          git add .keepalive
          git commit -m "chore: keep alive [$(date -u '+%Y-%m-%d')]"
          git push
